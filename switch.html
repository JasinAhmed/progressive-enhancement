<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Switch control / Progressive Enhancement / FDND</title>

		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
		<link href="assets/styles.css" rel="stylesheet">

		<style>
			/* Schrijf hier gewoon je CSS voor dit component */

			/* Hint: Dit component kun je volledig met HTML en CSS bouwen */

			/* Hint: Hoe ver ga je qua styling? Vraag jezelf dit altijd af */


			/* ruimte onder de switch */
			form {
				margin-bottom: 1rem;
			}

			/* basis van de switch (de checkbox zelf) */
			input {
				appearance: none; /* standaard checkbox weg */
				width: 7em;
				aspect-ratio: 2/1; /* verhouding van de knop */
				margin: 1rem;
				background-color: gray; /* uit = grijs */
				border-radius: 1.5rem;
				cursor: pointer;
				display: flex;
				align-items: center;
			}

			/* het bolletje */
			input::after {
				display: block;
				content: "";
				width: 3em;
				aspect-ratio: 1/1;
				background-color: white;
				border-radius: inherit;

				transition: translate 0.25s ease; /* animatie */
				margin-inline: 0.25rem;
			}

			/* als de switch aan staat */
			input:checked {
				background-color: var(--green); /* wordt groen */
			}

			/* bolletje schuift + tekst verschijnt */
			input:checked::after {
				display: flex;
				justify-content: center;
				align-items: center;

				font-family: Arial, Helvetica, sans-serif;
				font-weight: bold;

				content: "aan"; /* tekst in bolletje */
				background-color: white;

				translate: 115%; /* schuift naar rechts */
			}

			/* gebruikersinstelling voor minder animatie */
			@media (prefers-reduced-motion: reduce) {
				input::after {
					transition: none; /* animatie uit */
				}
			}
		</style>
	</head>

	<body>
		<h1>Switch control</h1>

		<form>
			<input type="checkbox" name="switch">
		</form>

		<!-- Hint: Safari heeft hiervoor iets bedacht, maar is dat al een standaard?
		     Wat gebeurt er in browsers die dat nog niet ondersteunen? -->
		<details open>
			<summary>Demo video</summary>
			<video src="assets/switch.mp4" width="119" height="67" controls muted autoplay loop>
				<a href="assets/switch.mp4">assets/switch.mp4</a>
			</video>
		</details>
	</body>
</html>
